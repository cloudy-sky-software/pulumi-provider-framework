on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

env:
  GO_VERSION: 1.25.x

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v6

      - name: Unshallow clone for tags
        run: git fetch --prune --unshallow --tags

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@b7bcab6379029e905e3f389a6bf301f1bc220662
        with:
          # Use a commit hash from https://github.com/golangci/golangci-lint/commits/main.
          version: 4fde6f7cf67bd4729e4c2f42e18f0fbdbb98fcfe
          install-mode: goinstall
          args: --config=.golangci.yaml --timeout=10m

      - name: Test
        run: make test
